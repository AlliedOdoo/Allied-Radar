  <text x="60" y="72" fill="#181817" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">Current Android companion</text>
  <text x="60" y="104" fill="#77736d" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">This is the functional phone bridge that exists today: pairing, notification access, and WhatsApp handoff review.</text>

